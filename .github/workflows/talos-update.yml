name: Talos Update

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "patches/common.yaml"
      - "patches/controlplane.yaml"
      - "image.yml"
      - ".sops.yaml"
      - "secrets/**"
      - "manifests/infra/**"
      - "flake.nix"
      - "flake.lock"
      - "scripts/**"
      - ".github/actions/cluster-access/**"
      - ".github/workflows/talos-update.yml"

concurrency:
  group: talos-update-production
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  update-control-plane:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: Development
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Prepare cluster access
        # Real secret decryption is allowed only in this trusted workflow.
        uses: ./.github/actions/cluster-access
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

      - name: Run Talos update
        run: nix develop .#default --command bash ./scripts/run-talos-update.sh

      - name: Clean up secrets
        if: always()
        run: |
          rm -rf .secret
